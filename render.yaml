services:
  - type: web
    name: reactor-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: FABRIC_OPENAPI_PATH
        value: /app/openapi.yml
      - key: FABRIC_CORS_ALLOWED_ORIGINS
        sync: false
      - key: FABRIC_DEMO_EVENTS_ENABLED
        value: "false"
      - key: FABRIC_SMPP_HOST
        sync: false
      - key: FABRIC_SMPP_PORT
        value: "2775"
      - key: FABRIC_SMPP_SYSTEM_ID
        sync: false
      - key: FABRIC_SMPP_PASSWORD
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_CHAT_MODEL
        value: llama3.2:3b
      - key: OLLAMA_EMBEDDING_MODEL
        value: nomic-embed-text
      - key: SPRING_R2DBC_URL
        sync: false
      - key: SPRING_R2DBC_USERNAME
        sync: false
      - key: SPRING_R2DBC_PASSWORD
        sync: false
      - key: SPRING_FLYWAY_URL
        sync: false
      - key: SPRING_FLYWAY_USER
        sync: false
      - key: SPRING_FLYWAY_PASSWORD
        sync: false

  - type: web
    name: reactor-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
