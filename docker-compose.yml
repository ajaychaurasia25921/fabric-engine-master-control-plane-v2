services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fabric
      POSTGRES_USER: fabric
      POSTGRES_PASSWORD: fabric
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fabric -d fabric"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: llama3.2:3b
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      FABRIC_OPENAPI_PATH: /app/openapi.yml
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/fabric
      SPRING_R2DBC_USERNAME: fabric
      SPRING_R2DBC_PASSWORD: fabric
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/fabric
      SPRING_FLYWAY_USER: fabric
      SPRING_FLYWAY_PASSWORD: fabric
      REACTOR_VM_EXECUTION_ENABLED: ${REACTOR_VM_EXECUTION_ENABLED:-false}
      REACTOR_VM_ROOT: ${REACTOR_VM_ROOT:-/app/ReactorVMs}
      REACTOR_VMRUN_BINARY: ${REACTOR_VMRUN_BINARY:-vmrun}
      REACTOR_VMWARE_DISKMANAGER_BINARY: ${REACTOR_VMWARE_DISKMANAGER_BINARY:-vmware-vdiskmanager}
      REACTOR_QEMU_IMG_BINARY: ${REACTOR_QEMU_IMG_BINARY:-qemu-img}
      REACTOR_QEMU_SYSTEM_BINARY: ${REACTOR_QEMU_SYSTEM_BINARY:-qemu-system-x86_64}
    volumes:
      - reactor-vms:/app/ReactorVMs
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  ollama-data:
  postgres-data:
  reactor-vms:
